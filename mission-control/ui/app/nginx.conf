server {
    listen 3098;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE endpoint — long-lived streaming connection
    location /api/metrics/stream {
        proxy_pass          http://mission-control:3099;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Connection        '';
        proxy_set_header    X-Accel-Buffering no;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  86400s;
        # Prevent nginx gzip from buffering the stream
        gzip                off;
        # Forward CORS headers set by Express
        add_header          Access-Control-Allow-Origin  * always;
        add_header          Access-Control-Allow-Headers 'Accept, Cache-Control' always;
        add_header          Cache-Control                no-cache always;
    }

    # Proxy all other API calls to the Mission Control server
    location /api/ {
        proxy_pass         http://mission-control:3099;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
    }
}
